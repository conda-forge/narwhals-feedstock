schema_version: 1

context:
  name: narwhals
  version: "2.18.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/narwhals-${{ version }}.tar.gz
  sha256: 652a1fcc9d432bbf114846688884c215f17eb118aa640b7419295d2f910d2a8b

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - narwhals
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Extremely lightweight compatibility layer between pandas, Polars, cuDF, and Modin
  license: MIT
  license_file: LICENSE.md
  homepage: https://marcogorelli.github.io/narwhals/
  repository: https://github.com/MarcoGorelli/narwhals

extra:
  recipe-maintainers:
    - MarcoGorelli
    - thewchan
